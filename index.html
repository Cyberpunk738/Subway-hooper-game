<!DOCTYPE html>
<html lang="en">

<head>
	<meta name="ory-verify" content="orynth-6b8a6769ce2e47e586c57d544acca25b" />
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>SUBWAY SUPER HOPPER GAME</title>
	<meta name="description" content="Subway Super Hopper — a cute endless runner with global leaderboards. Hop to the Top! Jump, dodge, collect coins & power-ups, and compete for the #1 score!" />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap" />
	<link rel="stylesheet" href="./style.css" />
</head>

<body>
	<div id="game-container"></div>

	<!-- Username Modal (shown on first visit) -->
	<div id="username-modal" class="hidden">
		<div class="modal-box">
			<h1 class="modal-title">WHO ARE YOU?</h1>
			<p class="modal-subtitle">CHOOSE A NAME FOR THE LEADERBOARD</p>
			<input type="text" id="username-input" placeholder="ENTER NAME..." maxlength="16" autocomplete="off" spellcheck="false" />
			<p class="modal-error" id="username-error"></p>
			<div class="modal-buttons">
				<button id="set-name-btn">SET NAME</button>
				<button id="play-anon-btn">PLAY ANONYMOUS</button>
			</div>
		</div>
	</div>

	<!-- Leaderboard Overlay -->
	<div id="leaderboard-overlay" class="hidden">
		<div id="leaderboard-panel">
			<h2>🏆 TOP SCORES</h2>
			<div id="lb-tabs">
				<button class="lb-tab lb-tab-active" id="lb-tab-all">ALL TIME</button>
				<button class="lb-tab" id="lb-tab-week">THIS WEEK</button>
			</div>
			<ul id="leaderboard-list">
				<li class="lb-loading">LOADING...</li>
			</ul>
			<button id="close-lb-btn">CLOSE</button>
		</div>
	</div>

	<!-- Shop Overlay -->
	<div id="shop-overlay" class="hidden">
		<div id="shop-panel">
			<h2>🛒 SKIN SHOP</h2>
			<p id="shop-coins">🪙 <span id="shop-coin-count">0</span></p>
			<div id="skin-grid"></div>
			<button id="close-shop-btn">CLOSE</button>
		</div>
	</div>

	<!-- Badges Overlay -->
	<div id="badges-overlay" class="hidden">
		<div id="badges-panel">
			<h2>🏅 ACHIEVEMENTS</h2>
			<div id="badges-grid"></div>
			<button id="close-badges-btn">CLOSE</button>
		</div>
	</div>

	<div id="ui-layer">
		<!-- HUD: Score -->
		<div id="score-display" class="hidden">
			SCORE: <span id="score">0</span>
		</div>
		<!-- HUD: Coins -->
		<div id="coin-display" class="hidden">
			🪙 <span id="coins">0</span>
		</div>
		<!-- HUD: Active Power-ups -->
		<div id="powerup-display" class="hidden"></div>
		<!-- HUD: Combo Counter -->
		<div id="combo-display" class="hidden"></div>

		<!-- HUD: Near Miss Flash -->
		<div id="near-miss-flash" class="hidden">NEAR MISS! +25</div>
		<!-- HUD: Milestone Banner -->
		<div id="milestone-banner" class="hidden"></div>
		<!-- HUD: Mute Button -->
		<button id="mute-btn" title="Toggle Music">🔊</button>
		<!-- Achievement Toast -->
		<div id="achievement-toast" class="hidden"></div>

		<!-- Username badge (shown during gameplay) -->
		<div id="username-badge" class="hidden">
			<span class="badge-icon">👤</span>
			<span id="badge-name"></span>
		</div>

		<div id="instructions">
			STEPS:<br />
			<span class="key">←</span> <span class="key">→</span> MOVE<br />
			<span class="key">↑</span> JUMP
		</div>

		<div id="start-screen" class="center-screen">
			<h1 class="title">SUPER HOPPER</h1>
			<p class="subtitle">HOP TO THE TOP</p>
			<div id="streak-display" class="hidden"></div>
			<div id="coin-bank-display">🪙 <span id="bank-coins">0</span></div>
			<button id="start-btn">PRESS START</button>
			<div class="screen-btn-row">
				<button id="leaderboard-btn">🏆 LEADERBOARD</button>
				<button id="shop-btn">🛒 SHOP</button>
				<button id="badges-btn">🏅 BADGES</button>
			</div>
			<a href="https://orynth.dev/projects/subway-hooper-game" target="_blank" rel="noopener" class="orynth-badge">
				<img src="https://orynth.dev/api/badge/subway-hooper-game?theme=light&style=default" alt="Featured on Orynth" width="260" height="80" />
			</a>
		</div>

		<div id="game-over-screen" class="center-screen hidden">
			<h1 class="title">GAME OVER</h1>
			<p class="subtitle">SCORE: <span id="final-score">0</span></p>
			<p id="coins-collected">🪙 <span id="final-coins">0</span> COINS</p>
			<p id="personal-best" class="hidden">BEST: <span id="best-score">0</span></p>
			<button id="restart-btn">TRY AGAIN</button>
			<div class="screen-btn-row">
				<button id="leaderboard-btn-go">🏆 LEADERBOARD</button>
				<button id="share-btn">📤 SHARE SCORE</button>
				<button id="home-btn">🏠 HOME</button>
			</div>
		</div>

		<!-- Mobile On-Screen Controls -->
		<div id="mobile-controls" class="hidden">
			<button id="mobile-left" class="mobile-btn" aria-label="Move Left">←</button>
			<button id="mobile-jump" class="mobile-btn mobile-jump-btn" aria-label="Jump">↑</button>
			<button id="mobile-right" class="mobile-btn" aria-label="Move Right">→</button>
		</div>
	</div>

	<!-- Scripts -->
	<!-- Supabase CDN (lightweight, ~12KB gzipped) -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

	<!-- Using ES Modules for Three.js -->
	<script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>

	<script type="module" src="./script.js"></script>
</body>
</html>
